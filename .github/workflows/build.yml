name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

# Needed for tauri-action to create the GitHub Release.
permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            label: windows
            args: "--bundles nsis"
          - os: macos-latest          # Apple Silicon (arm64)
            label: macos-arm64
            args: "--bundles app,dmg"
          - os: ubuntu-22.04
            label: linux-x64
            args: "--bundles deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Enable pnpm via corepack
        shell: bash
        run: |
          corepack enable
          corepack prepare pnpm@11.1.0 --activate

      - uses: dtolnay/rust-toolchain@stable

      - name: Enable Windows long paths (NSIS packs deeply-nested node_modules)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force | Out-Null
          git config --system core.longpaths true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('desktop/src-tauri/Cargo.lock') }}

      - name: Linux system deps (WebKitGTK + tray)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            patchelf \
            libayatana-appindicator3-dev

      - name: Install OpenClaw npm runtime
        shell: bash
        run: |
          mkdir -p openclaw-runtime2
          cd openclaw-runtime2
          # Pin a single top-level @mistralai/mistralai (avoids nested deep paths
          # that blow Windows MAX_PATH in the NSIS packer).
          echo '{"name":"openclaw-runtime","private":true,"version":"0.0.0","overrides":{"@mistralai/mistralai":"2.2.1"}}' > package.json
          npm install openclaw@latest --no-fund --no-audit --loglevel=warn
          npm dedupe --no-fund --no-audit || true

      - name: Prepare bundle (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./scripts/prepare-bundle.ps1 -SkipInstall -SkipUiBuild

      - name: Prepare bundle (macOS / Linux)
        if: runner.os != 'Windows'
        shell: bash
        run: bash scripts/prepare-bundle.sh

      - name: Install Tauri CLI deps
        shell: bash
        run: cd desktop && pnpm install

      # Build + sign + upload to a single GitHub Release, and merge the
      # cross-platform updater manifest (latest.json) used by the in-app updater.
      - name: Build, sign, release
        uses: tauri-apps/tauri-action@v0
        env:
          # Prefer a PAT (RELEASE_TOKEN) — the default GITHUB_TOKEN can't create
          # releases on this repo. Falls back to GITHUB_TOKEN if PAT absent.
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN || secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'v0.0.0-dev' }}
          releaseName: "OpenClaw ${{ github.ref_name }}"
          releaseBody: "OpenClaw Desktop — automated release. See assets below for your platform. The app auto-updates from this channel."
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.args }}
